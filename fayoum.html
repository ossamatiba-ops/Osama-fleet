<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تطبيق الفيوم - طيبة الزعيري</title>
<link rel="manifest" href="manifest-fayoum.json">
<meta name="theme-color" content="#0d2b0d">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="تطبيق الفيوم">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;min-height:100vh;background:#0d2b0d;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem}
.logo{text-align:center;margin-bottom:2rem}
.logo-icon{width:80px;height:80px;background:linear-gradient(135deg,#22c55e,#15803d);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;box-shadow:0 0 0 12px rgba(34,197,94,.15)}
.logo-icon svg{width:40px;height:40px;fill:none;stroke:#fff;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.logo h1{color:#fff;font-size:1.5rem;font-weight:800}
.logo .sub{color:#4ade80;font-size:.95rem;font-weight:700;margin-top:4px}
.logo .by{color:rgba(255,255,255,.4);font-size:.75rem;margin-top:4px}
.install-banner{display:none;background:#4ade80;color:#0d2b0d;border-radius:16px;padding:1.25rem 1.5rem;width:100%;max-width:400px;margin-bottom:1.25rem;text-align:center}
.install-banner p{font-size:.85rem;font-weight:700;margin-bottom:.75rem}
.install-btn{background:#0d2b0d;color:#4ade80;border:none;border-radius:10px;padding:12px 24px;font-family:'Cairo',sans-serif;font-size:.95rem;font-weight:800;cursor:pointer;width:100%}
.install-note{font-size:.72rem;margin-top:.5rem;opacity:.7}
.open-btn{background:linear-gradient(135deg,#22c55e,#15803d);color:#fff;border:none;border-radius:16px;padding:1.25rem;width:100%;max-width:400px;font-family:'Cairo',sans-serif;font-size:1.05rem;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.75rem;text-decoration:none;box-shadow:0 8px 30px rgba(34,197,94,.3)}
.open-btn svg{width:26px;height:26px;fill:none;stroke:#fff;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.manual-install{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:1.25rem;width:100%;max-width:400px;margin-top:1rem;text-align:right}
.manual-install h3{color:#fff;font-size:.88rem;font-weight:700;margin-bottom:.75rem}
.manual-install p{color:rgba(255,255,255,.6);font-size:.78rem;line-height:1.8}
.manual-install .step{color:#4ade80;font-weight:700}
.foot{margin-top:2rem;color:rgba(255,255,255,.2);font-size:.72rem;text-align:center}
</style>
</head>
<body>

<div class="install-banner" id="installBanner">
  <p>📲 ثبت التطبيق على جهازك!<br><span style="font-weight:400;font-size:.78rem">التطبيق سيعمل من غير إنترنت بعد التثبيت</span></p>
  <button class="install-btn" onclick="installApp()">📥 ثبت التطبيق الآن</button>
  <div class="install-note">لمسة واحدة وهيظهر على شاشتك</div>
</div>

<div class="logo">
  <div class="logo-icon">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
  </div>
  <h1>تطبيق الفيوم</h1>
  <div class="sub">📍 منطقة الفيوم</div>
  <div class="by">طيبة - الزعيري | أسامه محمد</div>
</div>

<a class="open-btn" href="https://script.google.com/macros/s/AKfycbwNPruhfAeXaAvSvziIhDFoXf2n7kjKUJuq1Qk2_f1KcHgQEM9ltLknHlzMt_Y-J5Nlig/exec?page=fayoum" target="_blank">
  <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
  دخول تطبيق الفيوم
</a>

<div class="manual-install" id="manualInstall" style="display:none">
  <h3>📌 طريقة التثبيت اليدوي:</h3>
  <p id="installSteps"></p>
</div>

<div class="foot">نظام إدارة أسطول طيبة — الزعيري</div>

<script>
let deferredPrompt;
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').style.display = 'block';
});
function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(function() {
    deferredPrompt = null;
    document.getElementById('installBanner').style.display = 'none';
  });
}
window.addEventListener('load', function() {
  var isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if (!isStandalone) {
    var manualDiv = document.getElementById('manualInstall');
    var stepsEl = document.getElementById('installSteps');
    var ua = navigator.userAgent;
    if (/iPhone|iPad|iPod/i.test(ua)) {
      manualDiv.style.display = 'block';
      stepsEl.innerHTML = '<span class="step">1.</span> اضغط على زرار المشاركة 🔗 في الأسفل<br><span class="step">2.</span> اختار "إضافة إلى الشاشة الرئيسية"<br><span class="step">3.</span> اضغط "إضافة"';
    } else if (/Android/i.test(ua)) {
      setTimeout(function() {
        if (!deferredPrompt) {
          manualDiv.style.display = 'block';
          stepsEl.innerHTML = '<span class="step">1.</span> اضغط على النقاط الثلاثة ⋮ في المتصفح<br><span class="step">2.</span> اختار "إضافة إلى الشاشة الرئيسية"<br><span class="step">3.</span> اضغط "إضافة"';
        }
      }, 3000);
    } else {
      manualDiv.style.display = 'block';
      stepsEl.innerHTML = '<span class="step">1.</span> اضغط على أيقونة التثبيت في شريط العنوان ⊕<br><span class="step">2.</span> أو من قائمة المتصفح اختار "تثبيت التطبيق"';
    }
  }
});
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/Osama-fleet/sw.js');
}
</script>
</body>
</html>
